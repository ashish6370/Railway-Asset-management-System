spring.application.name=assetvault-backend
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/assetvault?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
app.jwtSecret=${JWT_SECRET:assetvaultSecretKeyThatIsVeryLongAndSecureForHS512Algorithm1234567890123456789012345678901234567890}
app.jwtExpirationMs=86400000

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

spring.flyway.baseline-on-migrate=true
spring.flyway.enabled=true

# Configurable Public Base URL for QR Codes (Point this to Angular frontend)
app.public-url=${PUBLIC_URL:http://10.147.23.21:4200}
